# OgameX flagship — fs.7x24hrs.com (or any host)
#
# Routes:
#   /ogamex/*    → sidecar HTTP API (28791)
#   /ws          → sidecar WS upgrade (same-port 28791)
#   /dl/         → sidecar /dl/ (serves /tmp/ogame-runtime.user.js)
#   /_next/static/ → static files (Next.js standalone 不 self-serve)
#   /            → Next.js standalone (3002)
#
# v1.0.17 deploy lessons baked in:
#   1. /_next/static MUST nginx-serve from disk; standalone server 不 serve
#      静态资源, 漏配 = login JS 404 = Sign in silent fail.
#   2. 静态资源 dir 必须 owner = www-data (从 /root/* 复制到 /var/www/ogame-next/static/),
#      否则 nginx 403 Permission denied.
#   3. BUILD_ID 同步: .next/static 必须跟 .next/standalone 来自**同一次 build**,
#      否则 chunk hash mismatch.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ${DOMAIN} _;
    client_max_body_size 16M;

    # Sidecar /ogamex/* — API (含 /v1/me/bridge-status, /v1/expedition, /v1/state, ...)
    location /ogamex/ {
        proxy_pass http://127.0.0.1:28791;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # WS upgrade — same-port as HTTP per memory [[cf-router-ws-path]]
    location /ws {
        proxy_pass http://127.0.0.1:28791;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # Userscript download — sidecar serves /tmp/ogame-runtime.user.js
    location /dl/ {
        proxy_pass http://127.0.0.1:28791/dl/;
        proxy_set_header Host $host;
    }

    # Next.js standalone — _next/static MUST nginx-serve (v1.0.17 deploy fix).
    # Files are rsynced into /var/www/ogame-next/static (www-data owned) by deploy.sh.
    location /_next/static/ {
        alias /var/www/ogame-next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Favicon — if public/ contains one
    location /favicon.ico {
        alias /var/www/ogame-next/public/favicon.ico;
        access_log off;
        try_files $uri =404;
    }

    # Next.js app (3002 standalone)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
